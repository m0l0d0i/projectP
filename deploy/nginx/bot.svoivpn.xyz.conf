limit_req_zone $binary_remote_addr zone=healthz_zone:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=metrics_zone:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=webhook_zone:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name bot.svoivpn.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.svoivpn.xyz;

    ssl_certificate /etc/letsencrypt/live/bot.svoivpn.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.svoivpn.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    location = /metrics {
        limit_req zone=metrics_zone burst=5 nodelay;
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Public lightweight liveness probe.
    location = /healthz {
        limit_req zone=healthz_zone burst=10 nodelay;
        limit_except GET HEAD { deny all; }

        proxy_pass http://127.0.0.1:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Internal readiness probe only.
    location = /readyz {
        limit_req zone=healthz_zone burst=10 nodelay;
        allow 127.0.0.1;
        allow ::1;
        deny all;
        limit_except GET HEAD { deny all; }

        proxy_pass http://127.0.0.1:8080/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Telegram webhook -> aiohttp public app.
    location = /webhook/telegram {
        limit_req zone=webhook_zone burst=30 nodelay;
        limit_except POST { deny all; }

        proxy_pass http://127.0.0.1:8080/webhook/telegram;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Platega server-to-server callback -> aiohttp public app.
    location = /callbacks/platega/payment-status {
        limit_req zone=webhook_zone burst=20 nodelay;
        limit_except POST { deny all; }

        proxy_pass http://127.0.0.1:8080/callbacks/platega/payment-status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Public payment result pages -> local-only FastAPI app on 127.0.0.1:8001.
    # These endpoints are intentionally exposed via nginx only; the admin surface stays hidden.
    location = /payment/success {
        limit_except GET HEAD { deny all; }

        proxy_pass http://127.0.0.1:8001/payment/success;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /payment/failed {
        limit_except GET HEAD { deny all; }

        proxy_pass http://127.0.0.1:8001/payment/failed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Explicitly do not expose admin or legacy subscription paths on the bot domain.
    location ^~ /admin/ { return 404; }
    location ^~ /subscription/ { return 404; }
    location ^~ /profile/ { return 404; }
    location ^~ /sub/ { return 404; }

    location / {
        return 404;
    }
}
