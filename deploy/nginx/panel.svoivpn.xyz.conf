server {
    listen 80;
    listen [::]:80;
    server_name panel.svoivpn.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.svoivpn.xyz;

    ssl_certificate /etc/letsencrypt/live/panel.svoivpn.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.svoivpn.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # The only public route on the panel domain: Marzban-native subscription endpoint.
    location ^~ /sub/ {
        limit_except GET HEAD { deny all; }

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Explicitly block legacy and sensitive surfaces from the public panel domain.
    location ^~ /subscription/ { return 404; }
    location ^~ /profile/ { return 404; }
    location ^~ /api/ { return 404; }
    location ^~ /admin/ { return 404; }
    location = /docs { return 404; }
    location = /redoc { return 404; }
    location = /openapi.json { return 404; }

    location / {
        return 404;
    }
}
